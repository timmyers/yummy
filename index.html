<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yummy Garden 🌸</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Floating background elements -->
    <div id="bg-elements"></div>

    <!-- Rainbow arc -->
    <div id="rainbow" class="rainbow hidden">
      <div class="rainbow-band" style="--color: #FF6B6B; --i: 0"></div>
      <div class="rainbow-band" style="--color: #FFA94D; --i: 1"></div>
      <div class="rainbow-band" style="--color: #FFD43B; --i: 2"></div>
      <div class="rainbow-band" style="--color: #69DB7C; --i: 3"></div>
      <div class="rainbow-band" style="--color: #74C0FC; --i: 4"></div>
      <div class="rainbow-band" style="--color: #B197FC; --i: 5"></div>
      <div class="rainbow-band" style="--color: #F783AC; --i: 6"></div>
    </div>

    <!-- Sun -->
    <div id="sun">
      <div class="sun-face">☀️</div>
    </div>

    <!-- Header -->
    <header>
      <h1>🌸 Yummy Garden 🌸</h1>
      <p class="subtitle" id="greeting"></p>
      <div class="streak-bar">
        <span id="streak-label">🔥 0 day streak</span>
        <span id="total-meals">🍽️ 0 meals logged</span>
      </div>
    </header>

    <!-- Main content -->
    <main>
      <!-- Meal input section -->
      <section class="card input-card">
        <div id="meal-reminder" class="meal-reminder hidden">
          <span id="reminder-text"></span>
          <button type="button" id="reminder-dismiss" class="reminder-dismiss" aria-label="Dismiss">&times;</button>
        </div>
        <h2>What did you eat? 🍓</h2>
        <form id="meal-form">
          <div class="input-group">
            <input type="text" id="meal-input" placeholder="e.g. blueberry smoothie, mango salad..." autocomplete="off" required>
            <button type="submit" id="plant-btn">
              <span class="btn-text">Plant it! 🌱</span>
              <span class="btn-sparkle">✨</span>
            </button>
          </div>
          <div class="quick-picks">
            <button type="button" class="quick-pick" data-meal="🍓 Strawberries">🍓</button>
            <button type="button" class="quick-pick" data-meal="🫐 Blueberries">🫐</button>
            <button type="button" class="quick-pick" data-meal="🍇 Grapes">🍇</button>
            <button type="button" class="quick-pick" data-meal="🥭 Mango">🥭</button>
            <button type="button" class="quick-pick" data-meal="🍌 Banana">🍌</button>
            <button type="button" class="quick-pick" data-meal="🥗 Salad">🥗</button>
            <button type="button" class="quick-pick" data-meal="🍜 Soup">🍜</button>
            <button type="button" class="quick-pick" data-meal="🥪 Sandwich">🥪</button>
            <button type="button" class="quick-pick" data-meal="🍚 Rice bowl">🍚</button>
            <button type="button" class="quick-pick" data-meal="🥤 Smoothie">🥤</button>
          </div>
        </form>
      </section>

      <!-- Garden section -->
      <section class="card garden-card">
        <h2>Your Garden 🦋</h2>
        <div id="garden">
          <div id="garden-ground"></div>
          <div id="garden-plots"></div>
          <div id="butterflies"></div>
        </div>
        <div class="garden-stats">
          <span id="flower-count">🌸 0 flowers</span>
          <span id="butterfly-count">🦋 0 butterflies</span>
        </div>
        <div class="share-btn-wrap">
          <button type="button" id="share-btn" class="share-btn">Share 💌</button>
        </div>
      </section>

      <!-- Achievements section -->
      <section class="card achievements-card">
        <h2>Achievements 🏆</h2>
        <div id="badges-grid" class="badges-grid"></div>
      </section>

      <!-- Today's meals -->
      <section class="card meals-card">
        <h2>Today's Noms 🍽️</h2>
        <ul id="today-meals" class="meal-list">
          <li class="empty-state">Nothing yet — let's eat something! 🌱</li>
        </ul>
      </section>

      <!-- Weekly view -->
      <section class="card weekly-card">
        <h2>This Week 🌈</h2>
        <div id="weekly-grid" class="weekly-grid"></div>
      </section>
    </main>

    <!-- Celebration overlay -->
    <div id="celebration" class="celebration hidden">
      <div class="celebration-content">
        <div class="celebration-emoji" id="celebration-emoji">🌸</div>
        <p id="celebration-text">Your garden grew!</p>
      </div>
    </div>

    <!-- Share milestone prompt -->
    <div id="share-milestone" class="share-milestone hidden">
      <div class="share-milestone-content">
        <p id="share-milestone-text"></p>
        <div class="share-milestone-actions">
          <button type="button" id="share-milestone-yes" class="share-btn">Share 💌</button>
          <button type="button" id="share-milestone-dismiss" class="share-milestone-dismiss">Maybe later</button>
        </div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
