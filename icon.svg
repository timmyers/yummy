<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FFA07A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flower petals -->
  <g transform="translate(256,240)" fill="rgba(255,255,255,0.85)">
    <circle cx="0" cy="-60" r="48"/>
    <circle cx="57" cy="-19" r="48"/>
    <circle cx="35" cy="49" r="48"/>
    <circle cx="-35" cy="49" r="48"/>
    <circle cx="-57" cy="-19" r="48"/>
  </g>
  <!-- Flower center -->
  <circle cx="256" cy="240" r="32" fill="#FFD700"/>
  <!-- Stem -->
  <line x1="256" y1="290" x2="256" y2="400" stroke="#5a9e5a" stroke-width="10" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="230" cy="350" rx="24" ry="10" fill="#69DB7C" transform="rotate(-30,230,350)"/>
  <ellipse cx="282" cy="370" rx="24" ry="10" fill="#69DB7C" transform="rotate(30,282,370)"/>
</svg>
